<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Pro Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <div id="role-view" class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="text-center">
            <div class="mb-4">
                <img src="https://cdn-icons-png.flaticon.com/512/2997/2997313.png" width="80" alt="Logo"> <h1 class="fw-bold mt-3 mb-0">EduTrack <span class="text-primary italic">QR</span></h1>
                <p class="text-muted">ระบบจัดการห้องเรียนและเช็คชื่ออัจฉริยะ</p>
            </div>

            <div class="row g-4 justify-content-center">
                <div class="col-11 col-sm-6 col-md-5">
                    <div class="role-card shadow-sm p-4 bg-white rounded-4 border-0" onclick="selectRole('Student')">
                        <div class="icon-circle bg-student-light mb-3 mx-auto">
                            <img src="https://cdn-icons-png.flaticon.com/512/3429/3429433.png" width="50">
                        </div>
                        <h4 class="fw-bold text-dark">สำหรับนักเรียน</h4>
                        <p class="small text-muted mb-0">ดูสถิติมาเรียน & ส่งงาน</p>
                    </div>
                </div>

                <div class="col-11 col-sm-6 col-md-5">
                    <div class="role-card shadow-sm p-4 bg-white rounded-4 border-0" onclick="selectRole('Teacher')">
                        <div class="icon-circle bg-teacher-light mb-3 mx-auto">
                            <img src="https://cdn-icons-png.flaticon.com/512/906/906175.png" width="50">
                        </div>
                        <h4 class="fw-bold text-dark">สำหรับผู้สอน</h4>
                        <p class="small text-muted mb-0">จัดการข้อมูล & ตั้งค่าระบบ</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="login-view" class="container mt-5" style="display:none;">
        <button class="btn btn-link text-decoration-none mb-3" onclick="backToRole()">&larr; ย้อนกลับ</button>
        <div class="login-card mx-auto shadow-lg p-5 rounded-5 bg-white" style="max-width: 420px;">
            <div class="text-center mb-4">
                <h3 id="login-title" class="fw-bold text-primary">Login</h3>
                <p id="login-subtitle" class="text-muted small"></p>
            </div>
            <input type="text" id="username" class="form-control mb-3 rounded-pill" placeholder="ชื่อผู้ใช้">
            <input type="password" id="password" class="form-control mb-4 rounded-pill" placeholder="รหัสผ่าน">
            <button onclick="handleLogin()" class="btn btn-primary w-100 rounded-pill py-2 shadow fw-bold">เข้าสู่ระบบ</button>
        </div>
    </div>
    
    <div id="main-view" style="display:none;"> ... </div>
</div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
