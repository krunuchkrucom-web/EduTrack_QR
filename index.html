<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Pro Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner-border text-light"></div></div>

    <div id="login-view" class="container mt-5">
        <div class="login-card mx-auto shadow-lg p-5 rounded-5 bg-white" style="max-width: 400px;">
            <h2 class="text-center fw-bold text-primary mb-4">Classroom Login</h2>
            <input type="text" id="username" class="form-control mb-3 rounded-pill" placeholder="ชื่อผู้ใช้">
            <input type="password" id="password" class="form-control mb-4 rounded-pill" placeholder="รหัสผ่าน">
            <button onclick="handleLogin()" class="btn btn-primary w-100 rounded-pill py-2 shadow">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="main-view" style="display:none;">
        <nav class="navbar shadow-sm mb-4 px-3 sticky-top bg-white">
            <span class="navbar-brand fw-bold text-primary">Classroom Hub</span>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm rounded-pill">Logout</button>
        </nav>
        
        <div class="container" id="content-area"></div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
