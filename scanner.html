<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner System - EduTrack QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .scanner-box { position: relative; border: 4px solid #3b82f6; border-radius: 20px; overflow: hidden; background: #000; }
        .scan-line { height: 3px; width: 100%; background: linear-gradient(to right, transparent, #3b82f6, transparent); position: absolute; top: 0; animation: scanMove 2.5s infinite linear; box-shadow: 0 0 15px #3b82f6; z-index: 5; pointer-events: none; }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #reader { width: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-white border-r hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-6 border-b">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">EduTrack QR</h1>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="index.html" class="flex items-center p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition">
                <i class="fas fa-home w-8 text-lg"></i> หน้าหลัก
            </a>
            <a href="qrcode.html" class="flex items-center p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition">
                <i class="fas fa-qrcode w-8 text-lg"></i> สร้าง QR Code
            </a>
            <a href="scanner.html" class="flex items-center p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-200">
                <i class="fas fa-camera-retro w-8 text-lg"></i> สแกนเข้าเรียน/งาน
            </a>
        </nav>
        <div class="p-4 border-t">
            <button onclick="logout()" class="w-full flex items-center p-3 text-red-500 hover:bg-red-50 rounded-xl transition">
                <i class="fas fa-sign-out-alt w-8 text-lg"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main class="flex-1 p-4 md:p-8 overflow-y-auto">
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">ระบบตรวจสอบข้อมูลอัจฉริยะ</h2>
                <p class="text-gray-500">จัดการการเข้าเรียนและคะแนนผ่านการสแกน QR Code</p>
            </div>
            <div class="flex items-center bg-white p-2 rounded-2xl shadow-sm border">
                <span class="px-4 text-sm font-semibold text-gray-600 border-r">ห้องเรียน</span>
                <select id="classSelect" class="px-4 py-1 text-blue-600 font-bold focus:outline-none bg-transparent">
                    <option value="ปวช. 1/1">ปวช. 1/1</option>
                    <option value="ปวช. 2/1">ปวช. 2/1</option>
                    <option value="ปวช. 3/5">ปวช. 3/5</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-4 space-y-6">
                <div class="bg-white p-5 rounded-3xl shadow-sm border">
                    <h3 class="font-bold text-gray-700 mb-4 flex items-center">
                        <i class="fas fa-toggle-on mr-2 text-blue-500"></i> เลือกประเภทการสแกน
                    </h3>
                    <div class="flex p-1 bg-gray-100 rounded-2xl">
                        <button onclick="toggleMode('attendance')" id="btnAtt" class="flex-1 py-3 rounded-xl font-bold transition text-blue-600 bg-white shadow-sm">
                            เช็คชื่อเข้าเรียน
                        </button>
                        <button onclick="toggleMode('assignment')" id="btnAss" class="flex-1 py-3 rounded-xl font-bold transition text-gray-400">
                            ส่งงาน/ให้คะแนน
                        </button>
                    </div>
                </div>

                <div id="assignmentDetail" class="bg-white p-6 rounded-3xl shadow-sm border hidden">
                    <h3 class="font-bold text-gray-700 mb-4">ข้อมูลการส่งงาน</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">หัวข้อใบงาน</label>
                            <input type="text" id="workTitle" value="ใบงานที่ 1: พื้นฐานวงจรไฟฟ้า" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">คะแนนเต็ม</label>
                                <input type="number" id="fullScore" value="10" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition text-center text-lg font-bold">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">สถานะเวลา</label>
                                <select id="timeStatus" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                                    <option value="ปกติ">ปกติ</option>
                                    <option value="ส่งล่าช้า">ส่งล่าช้า</option>
                                </select>
                            </div>
                            <div class="mb-3">
                              <label class="form-label">ลิงก์ส่งงาน (File URL)</label>
                              <input type="url" id="file-url" class="form-control" placeholder="วางลิงก์ Google Drive หรือไฟล์ที่นี่">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-5">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border relative">
                    <div class="scanner-box aspect-square flex items-center justify-center">
                        <div class="scan-line"></div>
                        <div id="reader"></div>
                        
                        <div id="successOverlay" class="absolute inset-0 bg-green-500/90 hidden flex-col items-center justify-center text-white z-20">
                            <i class="fas fa-check-circle text-7xl mb-4"></i>
                            <h4 class="text-2xl font-bold">บันทึกสำเร็จ!</h4>
                            <p id="scannedName" class="mt-2 text-xl italic font-semibold">กำลังส่งข้อมูล...</p>
                        </div>
                    </div>
                    
                    <div class="mt-8 flex items-center justify-between p-4 bg-blue-50 rounded-2xl border border-blue-100">
                        <div>
                            <p class="text-xs text-blue-500 font-bold uppercase">Status</p>
                            <p id="statusLabel" class="text-blue-900 font-bold">กำลังเปิดกล้อง...</p>
                        </div>
                        <button onclick="restartScanner()" class="w-12 h-12 bg-white rounded-full shadow text-blue-600 hover:rotate-180 transition duration-500 flex items-center justify-center">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-3">
                <div class="bg-white p-6 rounded-3xl shadow-sm border h-full flex flex-col min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-gray-700">ประวัติสแกน</h3>
                        <span id="scanCount" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">0/40</span>
                    </div>
                    <div class="space-y-4 flex-1 overflow-y-auto pr-2" id="activityLog">
                        <div id="emptyLog" class="h-20 border-2 border-dashed border-gray-100 rounded-2xl flex items-center justify-center text-gray-300 text-xs italic text-center">พร้อมสแกน...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwT2u_h9_PzFsypgh_48GXwaesdoOYdvyRlkAA8CaAT9wzr3zW7mUVE3GM3r9nmQzeaZg/exec";
        let currentMode = 'attendance';
        let html5QrCode;
        let scanHistory = [];
        let isProcessing = false;

        // ฟังก์ชันสลับโหมด
        function toggleMode(mode) {
            currentMode = mode;
            const btnAtt = document.getElementById('btnAtt');
            const btnAss = document.getElementById('btnAss');
            const assDetail = document.getElementById('assignmentDetail');
            if (mode === 'attendance') {
                btnAtt.className = "flex-1 py-3 rounded-xl font-bold transition text-blue-600 bg-white shadow-sm";
                btnAss.className = "flex-1 py-3 rounded-xl font-bold transition text-gray-400";
                assDetail.classList.add('hidden');
            } else {
                btnAss.className = "flex-1 py-3 rounded-xl font-bold transition text-blue-600 bg-white shadow-sm";
                btnAtt.className = "flex-1 py-3 rounded-xl font-bold transition text-gray-400";
                assDetail.classList.remove('hidden');
            }
        }

        // เริ่มต้นกล้อง
        async function initScanner() {
            const statusLabel = document.getElementById('statusLabel');
            isProcessing = false;
            try {
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    html5QrCode = new Html5Qrcode("reader");
                    let cameraId = devices[0].id;
                    const backCamera = devices.find(device => 
                        device.label.toLowerCase().includes('back') || 
                        device.label.toLowerCase().includes('environment')
                    );
                    if (backCamera) cameraId = backCamera.id;

                    const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
                    await html5QrCode.start(cameraId, config, onScanSuccess);
                    statusLabel.innerText = "พร้อมสแกน...";
                } else {
                    statusLabel.innerText = "ไม่พบกล้อง";
                }
            } catch (err) {
                statusLabel.innerText = "กล้องปิดอยู่";
            }
        }

        // เมื่อสแกนสำเร็จ
        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            // แสดง Overlay
            showOverlay(decodedText);
            
            // เตรียมข้อมูลส่งไปยัง Apps Script
            const payload = {
                action: 'recordScan',
                id: decodedText,
                mode: currentMode,
                room: document.getElementById('classSelect').value,
                workName: currentMode === 'assignment' ? document.getElementById('workTitle').value : 'เช็คชื่อเข้าเรียน',
                score: currentMode === 'assignment' ? document.getElementById('fullScore').value : '-',
                status: document.getElementById('timeStatus').value,
                timestamp: new Date().toISOString()
            };

            const formData = new URLSearchParams();
            for (const key in payload) formData.append(key, payload[key]);

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                addToLog(decodedText);
                setTimeout(resumeScanner, 2000); // รอ 2 วินาทีค่อยสแกนคนถัดไป
            }).catch(err => {
                isProcessing = false;
                Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ', 'error');
            });
        }

        function showOverlay(id) {
            const overlay = document.getElementById('successOverlay');
            document.getElementById('scannedName').innerText = "ID: " + id;
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
        }

        function resumeScanner() {
            isProcessing = false;
            document.getElementById('successOverlay').classList.add('hidden');
            document.getElementById('successOverlay').classList.remove('flex');
        }

        function addToLog(id) {
            const logContainer = document.getElementById('activityLog');
            const emptyLog = document.getElementById('emptyLog');
            if (emptyLog) emptyLog.remove();

            const time = new Date().toLocaleTimeString('th-TH');
            const item = document.createElement('div');
            item.className = "p-3 bg-blue-50 rounded-xl border border-blue-100 mb-2 animate-pulse";
            item.innerHTML = `<div class="font-bold text-sm">ID: ${id}</div>
                              <div class="text-xs text-gray-500">${time} - บันทึกแล้ว</div>`;
            logContainer.prepend(item);
            
            scanHistory.push(id);
            document.getElementById('scanCount').innerText = scanHistory.length + "/40";
        }

        function restartScanner() { location.reload(); }
        function logout() { location.href = "index.html"; }

        window.onload = initScanner;
    </script>
</body>
</html>
