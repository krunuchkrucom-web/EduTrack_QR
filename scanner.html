<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner System - EduTrack QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- ใช้ Library Html5-Qrcode ที่เสถียรที่สุด -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; }
        #reader { width: 100%; border-radius: 1rem; overflow: hidden; border: none !important; }
        #reader__dashboard_section_csr button {
            background-color: #3b82f6 !important;
            color: white !important;
            padding: 8px 16px !important;
            border-radius: 8px !important;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg hidden md:block">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-600">EduTrack QR</h1>
            </div>
            <nav class="mt-6 px-4">
                <a href="teacher.html" class="flex items-center py-3 px-4 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition">
                    <i class="fas fa-users m-2"></i> จัดการนักเรียน
                </a>
                <a href="qrcode.html" class="flex items-center py-3 px-4 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition">
                    <i class="fas fa-qrcode m-2"></i> สร้าง QR Code
                </a>
                <a href="scanner.html" class="flex items-center py-3 px-4 bg-blue-600 text-white rounded-lg transition">
                    <i class="fas fa-camera m-2"></i> สแกนเข้าเรียน
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8">
            <div class="max-w-4xl mx-auto">
                <header class="mb-8">
                    <h2 class="text-3xl font-bold text-gray-800">ระบบตรวจสอบข้อมูลอัจฉริยะ</h2>
                    <p class="text-gray-500">จัดการการเข้าเรียนและคะแนนผ่านการสแกน QR Code</p>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Scanner Column -->
                    <div class="bg-white p-6 rounded-3xl shadow-sm">
                        <div class="mb-6 flex space-x-2 bg-gray-100 p-1 rounded-xl">
                            <button onclick="setMode('checkin')" id="mode-checkin" class="flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold">เช็คชื่อเข้าเรียน</button>
                            <button onclick="setMode('score')" id="mode-score" class="flex-1 py-2 rounded-lg text-gray-500 font-bold">ส่งงาน/ให้คะแนน</button>
                        </div>

                        <div id="reader" class="bg-black aspect-square mb-4"></div>
                        
                        <div id="status-area" class="p-4 rounded-xl bg-blue-50 text-center">
                            <p id="status-text" class="text-blue-600 font-bold">กำลังเตรียมความพร้อมของกล้อง...</p>
                        </div>
                    </div>

                    <!-- History Column -->
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">ประวัติสแกนล่าสุด</h3>
                        <div id="scan-history" class="space-y-4 max-h-[500px] overflow-y-auto">
                            <div class="text-center py-10 text-gray-400 italic">ยังไม่มีข้อมูลการสแกน</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz7N0cfEGWZWVMC4Pjenxne4zHkFarqlj2qDIO6rGtXYi2zSWH-2wAUxmVCtyM4ysrOVA/exec";
        let currentMode = 'checkin';
        let html5QrcodeScanner;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-checkin').className = mode === 'checkin' ? 'flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold' : 'flex-1 py-2 rounded-lg text-gray-500 font-bold';
            document.getElementById('mode-score').className = mode === 'score' ? 'flex-1 py-2 rounded-lg bg-white shadow text-blue-600 font-bold' : 'flex-1 py-2 rounded-lg text-gray-500 font-bold';
        }

        function onScanSuccess(decodedText, decodedResult) {
            // หยุดสแกนชั่วคราวเพื่อป้องกันการสแกนซ้ำซ้อนในเสี้ยววินาที
            html5QrcodeScanner.pause();
            processData(decodedText);
            
            // กลับมาสแกนใหม่หลังจาก 2 วินาที
            setTimeout(() => {
                html5QrcodeScanner.resume();
            }, 2000);
        }

        async function processData(id) {
            document.getElementById('status-text').innerText = "กำลังประมวลผลรหัส: " + id;
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'logAttendance', // หรือเปลี่ยนเป็น logQRGenerated ตาม code.gs คุณ
                        id: id,
                        mode: currentMode,
                        admin: JSON.parse(localStorage.getItem('userData'))?.name || 'Unknown'
                    })
                });
                const result = await response.json();
                
                if(result.success) {
                    updateHistory(id, "สำเร็จ");
                    document.getElementById('status-text').innerText = "บันทึกสำเร็จ!";
                    document.getElementById('status-text').className = "text-green-600 font-bold";
                }
            } catch (error) {
                updateHistory(id, "ผิดพลาด");
                console.error(error);
            }
        }

        function updateHistory(id, status) {
            const historyArea = document.getElementById('scan-history');
            if (historyArea.innerHTML.includes("ยังไม่มีข้อมูล")) historyArea.innerHTML = "";
            
            const item = document.createElement('div');
            item.className = "flex items-center p-3 bg-gray-50 rounded-xl border-l-4 " + (status === "สำเร็จ" ? "border-green-500" : "border-red-500");
            item.innerHTML = `
                <div class="flex-1">
                    <p class="font-bold text-gray-800">รหัส: ${id}</p>
                    <p class="text-xs text-gray-500">${new Date().toLocaleTimeString()}</p>
                </div>
                <span class="text-sm ${status === "สำเร็จ" ? "text-green-600" : "text-red-600"}">${status}</span>
            `;
            historyArea.prepend(item);
        }

        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", { fps: 10, qrbox: {width: 250, height: 250} }
            );
            html5QrcodeScanner.render(onScanSuccess);
            document.getElementById('status-text').innerText = "พร้อมสแกน...";
        }

        window.onload = startScanner;
    </script>
</body>
</html>
