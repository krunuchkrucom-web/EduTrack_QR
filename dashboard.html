<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Dashboard - EduTrack QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-white border-r hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-6 border-b">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">EduTrack QR</h1>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="index.html" class="flex items-center p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition">
                <i class="fas fa-home w-8 text-lg"></i> หน้าหลัก
            </a>
            <a href="dashboard.html" class="flex items-center p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-200">
                <i class="fas fa-chart-line w-8 text-lg"></i> แดชบอร์ดสรุปผล
            </a>
            <a href="scanner.html" class="flex items-center p-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition">
                <i class="fas fa-camera-retro w-8 text-lg"></i> สแกนเข้าเรียน/งาน
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8">
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">แดชบอร์ดสรุปผลการเรียน</h2>
                <p class="text-gray-500">ภาพรวมการเข้าเรียนและสถานะการส่งงานรายห้องเรียน</p>
            </div>
            <div class="flex items-center bg-white p-2 rounded-2xl shadow-sm border">
                <select id="classFilter" class="px-4 py-1 text-blue-600 font-bold focus:outline-none bg-transparent">
                    <option value="ปวช. 1/1">ปวช. 1/1</option>
                    <option value="ปวช. 2/1">ปวช. 2/1</option>
                    <option value="ปวช. 3/5">ปวช. 3/5</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-user-check text-xl"></i>
                    </div>
                    <span class="text-green-500 text-sm font-bold">+12%</span>
                </div>
                <h3 class="text-gray-400 text-sm font-medium">อัตราการมาเรียน</h3>
                <p class="text-2xl font-bold text-gray-800">92.5%</p>
            </div>
            
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-file-alt text-xl"></i>
                    </div>
                    <span class="text-blue-500 text-sm font-bold">85/100</span>
                </div>
                <h3 class="text-gray-400 text-sm font-medium">ส่งงานแล้ว</h3>
                <p class="text-2xl font-bold text-gray-800">85%</p>
            </div>

            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-yellow-100 text-yellow-600 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-clock text-xl"></i>
                    </div>
                    <span class="text-yellow-500 text-sm font-bold">5 คน</span>
                </div>
                <h3 class="text-gray-400 text-sm font-medium">มาสายสะสม</h3>
                <p class="text-2xl font-bold text-gray-800">14 ครั้ง</p>
            </div>

            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-star text-xl"></i>
                    </div>
                    <span class="text-purple-500 text-sm font-bold">ดีเยี่ยม</span>
                </div>
                <h3 class="text-gray-400 text-sm font-medium">คะแนนเฉลี่ยรวม</h3>
                <p class="text-2xl font-bold text-gray-800">8.45</p>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-7 bg-white p-6 rounded-3xl border shadow-sm">
                <h3 class="font-bold text-gray-700 mb-6">สถิติการเข้าเรียน 7 วันล่าสุด</h3>
                <canvas id="attendanceChart" height="250"></canvas>
            </div>

            <div class="col-span-12 lg:col-span-5 bg-white p-6 rounded-3xl border shadow-sm">
                <h3 class="font-bold text-gray-700 mb-6">ภาพรวมการส่งงาน</h3>
                <div class="relative flex items-center justify-center">
                    <canvas id="assignmentChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ข้อมูลตัวอย่างสำหรับแสดงผล (ในอนาคตสามารถใช้ fetch ดึงจาก Apps Script ได้)
        const ctxAttendance = document.getElementById('attendanceChart').getContext('2d');
        new Chart(ctxAttendance, {
            type: 'line',
            data: {
                labels: ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'],
                datasets: [{
                    label: 'จำนวนนักเรียนที่มาเรียน',
                    data: [38, 40, 35, 39, 37, 0, 0],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, max: 40 } }
            }
        });

        const ctxAssignment = document.getElementById('assignmentChart').getContext('2d');
        new Chart(ctxAssignment, {
            type: 'doughnut',
            data: {
                labels: ['ส่งปกติ', 'ส่งล่าช้า', 'ยังไม่ส่ง'],
                datasets: [{
                    data: [65, 20, 15],
                    backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '70%',
                plugins: {
                    legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                }
            }
        });
    </script>
</body>
</html>
