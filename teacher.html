<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - EduTrack QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .sidebar { width: 280px; min-height: 100vh; position: fixed; background: #fff; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 20px; width: calc(100% - 280px); }
        .card-action { transition: transform 0.2s; cursor: pointer; }
        .card-action:hover { transform: translateY(-5px); }
        .btn-room { border: none; transition: all 0.3s; }
        .btn-room.active { border: 2px solid #0d6efd; box-shadow: 0 0 10px rgba(13,110,253,0.2); }
    </style>
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar shadow-sm p-3">
            <div class="text-center mb-4">
                <h4 class="fw-bold text-primary">EduTrack QR</h4>
                <p class="small text-muted">Smart Attendance</p>
            </div>
            <ul class="nav nav-pills flex-column gap-2">
                <li class="nav-item"><a href="#" class="nav-link active py-3" onclick="showDashboard()"><i class="fa-solid fa-users me-2"></i> จัดการนักเรียน</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-dark py-3" onclick="showCreateQR()"><i class="fa-solid fa-qrcode me-2"></i> สร้าง QR</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-dark py-3"><i class="fa-solid fa-chart-bar me-2"></i> สรุปผลการเข้าเรียน</a></li>
                <li class="nav-item mt-5"><a href="#" class="nav-link text-danger py-3" onclick="logout()"><i class="fa-solid fa-sign-out-alt me-2"></i> ออกจากระบบ</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-4 shadow-sm">
                <h5 class="fw-bold mb-0">ยินดีต้อนรับ, <span id="teacher-name-display">...</span> 👋</h5>
                <div class="d-flex align-items-center" id="teacher-profile">
                    </div>
            </header>

            <div id="content-area">
                </div>
        </main>
    </div>

    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0"><h5 class="fw-bold" id="modalTitle">ข้อมูลนักเรียน</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="student-index">
                    <div class="mb-3"><label class="small">รหัสนักเรียน</label><input type="text" id="m-id" class="form-control rounded-pill"></div>
                    <div class="mb-3"><label class="small">ชื่อ-นามสกุล</label><input type="text" id="m-name" class="form-control rounded-pill"></div>
                </div>
                <div class="modal-footer border-0"><button class="btn btn-primary w-100 rounded-pill" onclick="saveStudent()">บันทึกข้อมูล</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="teacher.js"></script>
</body>
</html>
