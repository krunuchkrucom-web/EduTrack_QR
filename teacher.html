<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - EduTrack QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="d-flex">
        <nav class="sidebar bg-white shadow-sm vh-100 p-3" style="width: 280px; position: fixed;">
            <div class="mb-5 text-center">
                <h4 class="fw-bold text-primary">EduTrack QR</h4>
                <small class="text-muted">Smart Attendance</small>
            </div>
            <ul class="nav nav-pills flex-column px-2">
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link active py-3" onclick="showDashboard()">
                        <i class="fa-solid fa-house-user me-2"></i> จัดการนักเรียน
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-dark py-3" onclick="showCreateQR()">
                        <i class="fa-solid fa-qrcode me-2"></i> สร้าง QR
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-dark py-3">
                        <i class="fa-solid fa-chart-line me-2"></i> สรุปผลการเข้าเรียน
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <a href="#" class="nav-link text-danger py-3" onclick="logout()">
                        <i class="fa-solid fa-right-from-bracket me-2"></i> ออกจากระบบ
                    </a>
                </li>
            </ul>
        </nav>

        <main class="flex-grow-1" style="margin-left: 280px;">
            <header class="navbar bg-white p-3 shadow-sm sticky-top">
                <div class="container-fluid">
                    <h5 class="fw-bold mb-0">ยินดีต้อนรับ, ครูอนันต์ 👋</h5>
                    <div class="d-flex align-items-center">
                        <div class="me-3 text-end">
                            <div class="fw-bold small" id="teacher-name-top">ครูอนันต์</div>
                            <div class="text-muted" style="font-size: 10px;">Teacher</div>
                        </div>
                        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="40" class="rounded-circle border">
                    </div>
                </div>
            </header>

            <div class="p-4" id="content-area">
                </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="teacher.js"></script>
</body>
</html>
