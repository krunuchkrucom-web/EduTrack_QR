<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - EduTrack QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="d-flex">
        <nav class="sidebar bg-white shadow-sm vh-100 p-3 sticky-top" style="width: 280px;">
            <div class="mb-5 text-center">
                <h4 class="fw-bold text-primary">EduTrack QR</h4>
                <small class="text-muted">Smart Attendance</small>
            </div>
            <ul class="nav nav-pills flex-column">
                <li class="nav-item mb-2"><a href="#" class="nav-link active py-3" onclick="loadContent('home')"><i class="fa-solid fa-house-user me-2"></i> จัดการนักเรียน</a></li>
                <li class="nav-item mb-2"><a href="#" class="nav-link text-dark py-3" onclick="showQRManager()"><i class="fa-solid fa-qrcode me-2"></i> สร้าง QR</a></li>
                <li class="nav-item mb-2"><a href="#" class="nav-link text-dark py-3"><i class="fa-solid fa-chart-line me-2"></i> สรุปผลการเข้าเรียน</a></li>
                <li class="nav-item mt-5"><a href="#" class="nav-link text-danger py-3" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> ออกจากระบบ</a></li>
            </ul>
        </nav>

        <main class="flex-grow-1">
            <header class="navbar bg-white p-3 shadow-sm sticky-top">
                <div class="container-fluid">
                    <h5 class="fw-bold mb-0">ยินดีต้อนรับ, <span id="display-teacher-name">ครูอนันต์</span> 👋</h5>
                    <div id="user-status-area" class="d-flex align-items-center">
                        </div>
                </div>
            </header>

            <div class="p-4">
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0">เลือกห้องเรียน</h6>
                        <button class="btn btn-sm btn-outline-primary rounded-pill" onclick="manageRoom('add')">+ เพิ่มห้องเรียน</button>
                    </div>
                    <div class="row g-3" id="room-selection-area">
                        </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">ห้องเรียน: <span id="current-room-name">-</span></h5>
                        <div>
                            <button class="btn btn-primary rounded-pill px-4 me-2" onclick="startScanner()"><i class="fa-solid fa-camera me-2"></i>สแกนเข้าเรียน</button>
                            <button class="btn btn-success rounded-pill px-4" onclick="studentModal('add')"><i class="fa-solid fa-plus me-2"></i>เพิ่มนักเรียน</button>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>รหัส</th><th>ชื่อ-นามสกุล</th><th>USERNAME</th><th>สถานะ</th><th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="student-list-table">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="scannerModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0">
                <div class="modal-header border-0"><h5 class="fw-bold">สแกน QR Code</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body text-center"><div id="interactive" class="viewport border rounded-4 bg-dark" style="height: 300px;"></div></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="teacher.js"></script>
</body>
</html>
